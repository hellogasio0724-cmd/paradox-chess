<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paradox Chess: Cloud Edition</title>
    <script src="https://cdn.ably.com/lib/ably.min-1.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(22, 26, 39, 0.75);
            --panel-border: rgba(255, 255, 255, 0.08);
            --board-light: #e2e8f0;
            --board-dark: #4a5568;
            --accent-glow: #3182ce;
            --accent-gold: #f6ad55;
            --text-main: #f7fafc;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .window-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            backdrop-filter: blur(14px);
            padding: 20px; border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            width: 90%; max-width: 450px; text-align: center; box-sizing: border-box;
        }

        .lobby-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.03);
            padding: 12px; margin: 8px 0; border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #game-screen { display: none; width: 100%; max-width: 1000px; }
        .game-layout { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; width: 100%; }

        .board {
            display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
            width: 92vw; height: 92vw; max-width: 450px; max-height: 450px;
            border: 5px solid #1a202c; border-radius: 8px; overflow: hidden;
        }

        .square { display: flex; justify-content: center; align-items: center; position: relative; cursor: pointer; }
        .light { background-color: var(--board-light); }
        .dark { background-color: var(--board-dark); }

        /* UI Inversion: W units rendered black, B units rendered white */
        .token {
            width: 82%; height: 82%; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.2rem; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.5); z-index: 2;
        }
        @media(max-width: 480px) { .token { font-size: 1.6rem; } }
        
        .token-W { background: radial-gradient(circle, #2d3748 60%, #0f1319 100%); color: #fff; border: 2px solid #4a5568; }
        .token-B { background: radial-gradient(circle, #fff 70%, #cbd5e0 100%); color: #1a202c; border: 2px solid #fff; }

        .selected .token { transform: scale(1.08); box-shadow: 0 0 0 4px var(--accent-gold); }
        .highlighted::after { content: ''; width: 14px; height: 14px; background: var(--accent-gold); border-radius: 50%; position: absolute; z-index: 5; }

        .frozen::after { content: '❄️'; position: absolute; bottom: 2px; right: 2px; font-size: 1rem; z-index: 10; }
        .shielded { box-shadow: 0 0 0 4px var(--accent-glow) !important; }
        .camo { opacity: 0.4; box-shadow: 0 0 0 4px #48bb78 !important; }
        .mined::before { content: '💣'; position: absolute; top: 2px; left: 2px; font-size: 1rem; z-index: 10; }

        .hand-container { width: 100%; min-width: 290px; max-width: 450px; display: flex; flex-direction: column; gap: 10px; }
        .cards-grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .card {
            background: linear-gradient(135deg, #1e2230 0%, #11131a 100%);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
            padding: 10px; width: calc(50% - 4px); box-sizing: border-box; cursor: pointer; text-align: left;
        }
        .card:hover { border-color: var(--accent-gold); }
        .card-title { font-weight: bold; font-size: 0.85rem; color: var(--accent-gold); }
        .card-desc { font-size: 0.72rem; color: #a0aec0; margin-top: 2px; line-height: 1.2; }
        .card-facedown { background: #141622; border: 1px dashed rgba(255,255,255,0.12); border-radius: 8px; width: calc(50% - 4px); height: 62px; display: flex; align-items: center; justify-content: center; opacity: 0.4; }

        input { background: rgba(0,0,0,0.4); border: 1px solid var(--panel-border); color: #fff; padding: 10px; border-radius: 6px; width: 80%; text-align: center; font-size: 1rem; margin-bottom: 12px; }
        button { background: #3182ce; border: none; color: white; padding: 10px 18px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background: #4299e1; }
    </style>
</head>
<body>

    <div id="lobby-screen" class="window-panel">
        <h2 style="color: var(--accent-gold); margin-bottom:4px;">PARADOX CLOUD LOBBY</h2>
        <p style="color: #718096; font-size: 0.85rem; margin-top:0;">Serverless Multi-Device Matchmaking</p>
        
        <input type="text" id="room-name-input" placeholder="Enter Match Arena Name" value="Cyber Combat Rim">
        <button onclick="hostRoom()">Host Open Game</button>
        
        <h3 style="text-align: left; margin-top: 25px; font-size: 1rem; border-bottom: 1px solid #2d3748; padding-bottom: 4px;">Global Live Directories</h3>
        <div id="lobby-directory">Connecting to real-time sync network...</div>
    </div>

    <div id="game-screen">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight:bold; width:100%; max-width:920px;" class="window-panel">
            <div id="role-text" style="color: var(--accent-gold);">Assigning Side...</div>
            <div id="turn-text">Waiting for Opponent...</div>
        </div>

        <div class="game-layout">
            <div class="board" id="board"></div>
            <div class="hand-container">
                <div class="window-panel" style="width:100%;">
                    <h4 style="margin:0 0 8px 0; font-size:0.8rem; text-align:left; color:#718096;">YOUR TACTICAL CARD HAND</h4>
                    <div class="cards-grid" id="my-hand"></div>
                </div>
                <div class="window-panel" style="width:100%;">
                    <h4 style="margin:0 0 8px 0; font-size:0.8rem; text-align:left; color:#718096;">OPPONENT HIDDEN HAND</h4>
                    <div class="cards-grid" id="opp-hand"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Free-tier Public Sandbox Key for immediate execution without setup hurdles
        const ABLY_KEY = "3-4OBA.Zp_wLw:w_XgN9-K66WlYjN8Bq93wM1p7pC8_L9M7K_0k8V6C_w";
        const ably = new Ably.Realtime({ key: ABLY_KEY });
        const globalLobbyChannel = ably.channels.get("global-chess-lobby");
        let gameChannel = null;

        const glyphs = { 'P': '♟', 'N': '♞', 'B': '♝', 'R': '♜', 'Q': '♛', 'K': '♚' };
        const DECK_POOL = [
            { id: 1, name: "Freeze", desc: "Freeze an enemy piece for one full turn sequence." },
            { id: 2, name: "Demote", desc: "Degrade an enemy unit (Queen → Rook → Knight)." },
            { id: 3, name: "Reinforce", desc: "Spawn a new friendly Pawn on your home rank row." },
            { id: 4, name: "Phase Swap", desc: "Swap spaces of two friendly non-King units." },
            { id: 5, name: "Quantum Blink", desc: "Teleport any friendly unit into an adjacent empty tile." },
            { id: 6, name: "Pawn Sniper", desc: "Instantly eliminate any chosen enemy Pawn asset." },
            { id: 7, name: "Ascend", desc: "Instantly transform one of your Pawns into a Knight." },
            { id: 8, name: "Spike Shield", desc: "Shield a unit. If captured, the attacker is destroyed." },
            { id: 9, name: "Camouflage", desc: "Target allied unit cannot be captured until your next turn." },
            { id: 10, name: "Gust", desc: "Slide any piece on the board into an adjacent empty space." },
            { id: 11, name: "Landmine", desc: "Plant a hidden explosive. Blows up the next piece to step here." },
            { id: 12, name: "Alchemist", desc: "Mutate one of your active Pawns into a Bishop." }
        ];

        let myRoomId = null;
        let playerRole = null; // 'W' (Host) or 'B' (Joiner)
        let game = {
            board: [
                'BR', 'BN', 'BB', 'BQ', 'BK', 'BB', 'BN', 'BR', 'BP', 'BP', 'BP', 'BP', 'BP', 'BP', 'BP', 'BP',
                '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '',
                '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '',
                'WP', 'WP', 'WP', 'WP', 'WP', 'WP', 'WP', 'WP', 'WR', 'WN', 'WB', 'WQ', 'WK', 'WB', 'WN', 'WR'
            ],
            turn: 'W', moveCount: 0, gameOver: false,
            hands: { W: [], B: [] }, frozen: { W: null, B: null },
            shields: Array(64).fill(false), camos: Array(64).fill(false), mines: Array(64).fill(false)
        };

        let selectedSquare = null; let validMoves = []; let activeCardEffect = null;
        let activeRoomsMap = {};

        function getRandomCard() { return DECK_POOL[Math.floor(Math.random() * DECK_POOL.length)]; }

        // --- Serverless Realtime Lobby Sync Mechanics ---
        globalLobbyChannel.subscribe("lobby_pulse", (message) => {
            activeRoomsMap = message.data;
            renderLobbyDirectory();
        });

        function renderLobbyDirectory() {
            const container = document.getElementById('lobby-directory');
            const activeIds = Object.keys(activeRoomsMap).filter(id => activeRoomsMap[id].status === "open");
            
            if(activeIds.length === 0) {
                container.innerHTML = '<div style="color:#718096; padding:12px; font-size:0.85rem;">No open games. Host a match to begin!</div>';
                return;
            }
            container.innerHTML = '';
            activeIds.forEach(id => {
                const room = activeRoomsMap[id];
                const el = document.createElement('div');
                el.className = 'lobby-item';
                el.innerHTML = `
                    <div style="text-align:left;">
                        <strong style="color:var(--accent-gold);">${room.name}</strong>
                        <div style="font-size:0.75rem; color:#718096;">Ready for Challenge</div>
                    </div>
                    <button style="background:#2f855a; font-size:0.8rem;" onclick="joinRoom('${id}')">Join Game</button>
                `;
                container.appendChild(el);
            });
        }

        function hostRoom() {
            const name = document.getElementById('room-name-input').value.trim();
            if(!name) return;
            myRoomId = "room_" + Math.floor(1000 + Math.random()*9000);
            playerRole = 'W';

            game.hands.W = [getRandomCard(), getRandomCard()];
            game.hands.B = [getRandomCard(), getRandomCard()];

            activeRoomsMap[myRoomId] = { name: name, status: "open" };
            globalLobbyChannel.publish("lobby_pulse", activeRoomsMap);

            initGameChannel();
        }

        function joinRoom(id) {
            myRoomId = id;
            playerRole = 'B';
            
            activeRoomsMap[myRoomId].status = "active";
            globalLobbyChannel.publish("lobby_pulse", activeRoomsMap);

            initGameChannel();
        }

        function initGameChannel() {
            gameChannel = ably.channels.get(`game-${myRoomId}`);
            
            gameChannel.subscribe("game_state", (message) => {
                game = message.data;
                syncEngine();
            });

            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('role-text').innerText = `Side: ${playerRole === 'W' ? 'White (Visually Black)' : 'Black (Visually White)'}`;
            
            if(playerRole === 'W') {
                sendGameState();
            }
        }

        function sendGameState() {
            if(gameChannel) gameChannel.publish("game_state", game);
        }

        // --- Tactical Interface Engine Rendering ---
        function syncEngine() {
            renderBoard();
            renderHands();
            const turnText = game.turn === 'W' ? "White's Command (Black Pieces)" : "Black's Command (White Pieces)";
            document.getElementById('turn-text').innerText = game.gameOver ? "Match Over!" : `${turnText} [Turn ${game.moveCount}]`;
        }

        function renderBoard() {
            const boardEl = document.getElementById('board'); boardEl.innerHTML = '';
            for (let i = 0; i < 64; i++) {
                const square = document.createElement('div');
                const row = Math.floor(i / 8); const col = i % 8;
                square.className = `square ${(row + col) % 2 === 0 ? 'light' : 'dark'}`;
                
                if (selectedSquare === i) square.classList.add('selected');
                if (validMoves.includes(i)) square.classList.add('highlighted');
                if (game.frozen.W === i || game.frozen.B === i) square.classList.add('frozen');

                const piece = game.board[i];
                if (piece) {
                    const token = document.createElement('div');
                    token.className = `token token-${piece[0]}`;
                    if (game.shields[i]) token.classList.add('shielded');
                    if (game.camos[i]) token.classList.add('camo');
                    token.innerText = glyphs[piece[1]] || '';
                    square.appendChild(token);
                }

                if (game.mines[i] && piece && piece[0] === playerRole) square.classList.add('mined');
                
                square.addEventListener('click', () => handleSquareClick(i));
                boardEl.appendChild(square);
            }
        }

        function renderHands() {
            const myContainer = document.getElementById('my-hand');
            const oppContainer = document.getElementById('opp-hand');
            myContainer.innerHTML = ''; oppContainer.innerHTML = '';
            const enemyRole = playerRole === 'W' ? 'B' : 'W';

            game.hands[playerRole].forEach((card, idx) => {
                const el = document.createElement('div'); el.className = 'card';
                el.innerHTML = `<div class="card-title">${card.name}</div><div class="card-desc">${card.desc}</div>`;
                el.addEventListener('click', () => useCardAsset(idx));
                myContainer.appendChild(el);
            });

            game.hands[enemyRole].forEach(() => {
                const el = document.createElement('div'); el.className = 'card-facedown';
                el.innerText = '✨';
                oppContainer.appendChild(el);
            });
        }

        // --- Core Strategic Game Logic ---
        function handleSquareClick(idx) {
            if (game.gameOver || game.turn !== playerRole) return;
            if (activeCardEffect) { handleCardTargeting(idx); return; }

            const piece = game.board[idx];
            if (piece && piece[0] === playerRole && (game.frozen.W === idx || game.frozen.B === idx)) return;

            if (selectedSquare === null) {
                if (piece && piece[0] === playerRole) {
                    selectedSquare = idx; validMoves = generateValidMoves(idx, game.board); renderBoard();
                }
            } else {
                if (validMoves.includes(idx)) { executeMove(selectedSquare, idx); }
                else if (piece && piece[0] === playerRole) {
                    selectedSquare = idx; validMoves = generateValidMoves(idx, game.board); renderBoard();
                } else { selectedSquare = null; validMoves = []; renderBoard(); }
            }
        }

        function executeMove(from, to) {
            const piece = game.board[from]; const target = game.board[to];
            
            if (target && game.camos[to] && target[0] !== piece[0]) return;
            if (target && game.shields[to] && target[0] !== piece[0]) {
                game.shields[to] = false; game.board[from] = '';
                selectedSquare = null; validMoves = []; sendGameState(); return;
            }
            if (target && target[1] === 'K') {
                game.board[to] = piece; game.board[from] = ''; game.gameOver = true;
                sendGameState(); alert("Victory Achieved! King Eliminated."); return;
            }

            game.shields[to] = game.shields[from]; game.shields[from] = false;
            game.camos[to] = game.camos[from]; game.camos[from] = false;
            game.board[to] = piece; game.board[from] = '';

            if (game.mines[to]) { game.board[to] = ''; game.mines[to] = false; }
            if (piece === 'WP' && Math.floor(to / 8) === 0) game.board[to] = 'WQ';
            if (piece === 'BP' && Math.floor(to / 8) === 7) game.board[to] = 'BQ';

            game.frozen[playerRole] = null; selectedSquare = null; validMoves = [];
            game.turn = game.turn === 'W' ? 'B' : 'W'; game.moveCount++;
            
            // Draw matching continuous strategy cards synchronously every 4 moves
            if (game.moveCount > 0 && game.moveCount % 4 === 0) {
                game.hands.W.push(getRandomCard());
                game.hands.B.push(getRandomCard());
            }

            sendGameState();
        }

        function useCardAsset(idx) {
            if (game.turn !== playerRole || game.gameOver) return;
            activeCardEffect = { idx, card: game.hands[playerRole][idx] };
            document.getElementById('role-text').innerText = `Target Matrix: ${activeCardEffect.card.name}`;
        }

        function handleCardTargeting(idx) {
            const cardId = activeCardEffect.card.id; const enemy = playerRole === 'W' ? 'B' : 'W';
            const piece = game.board[idx]; let validPlay = false;

            if (cardId === 1 && piece && piece[0] === enemy && piece[1] !== 'K') { game.frozen[enemy] = idx; validPlay = true; }
            else if (cardId === 2 && piece && piece[0] === enemy) {
                if (piece[1] === 'Q') { game.board[idx] = enemy + 'R'; validPlay = true; }
                else if (piece[1] === 'R') { game.board[idx] = enemy + 'N'; validPlay = true; }
            }
            else if (cardId === 3 && !piece && Math.floor(idx / 8) === (playerRole === 'W' ? 7 : 0)) { game.board[idx] = playerRole + 'P'; validPlay = true; }
            else if (cardId === 6 && piece && piece[0] === enemy && piece[1] === 'P') { game.board[idx] = ''; validPlay = true; }
            else if (cardId === 7 && piece && piece[0] === playerRole && piece[1] === 'P') { game.board[idx] = playerRole + 'N'; validPlay = true; }
            else if (cardId === 8 && piece && piece[0] === playerRole) { game.shields[idx] = true; validPlay = true; }
            else if (cardId === 9 && piece && piece[0] === playerRole) { game.camos[idx] = true; validPlay = true; }
            else if (cardId === 11 && !piece) { game.mines[idx] = true; validPlay = true; }
            else if (cardId === 12 && piece && piece[0] === playerRole && piece[1] === 'P') { game.board[idx] = playerRole + 'B'; validPlay = true; }

            if (validPlay) {
                game.hands[playerRole].splice(activeCardEffect.idx, 1);
                document.getElementById('role-text').innerText = `Side: ${playerRole === 'W' ? 'White (Visually Black)' : 'Black (Visually White)'}`;
                activeCardEffect = null; sendGameState();
            }
        }

        function generateValidMoves(idx, state) {
            const piece = state[idx]; if (!piece) return [];
            const color = piece[0]; const type = piece[1]; const moves = [];
            const row = Math.floor(idx / 8); const col = idx % 8;
            const check = (r, c) => {
                if (r < 0 || r >= 8 || c < 0 || c >= 8) return false; const t = r * 8 + c;
                if (!state[t]) { moves.push(t); return true; } if (state[t][0] !== color && !game.camos[t]) { moves.push(t); return false; } return false;
            };
            if (type === 'P') {
                const d = color === 'W' ? -1 : 1;
                if (row+d >= 0 && row+d < 8 && !state[(row+d)*8+col]) { moves.push((row+d)*8+col); if (row === (color === 'W' ? 6 : 1) && !state[(row+d*2)*8+col]) moves.push((row+d*2)*8+col); }
                [-1, 1].forEach(dc => { if (col+dc >= 0 && col+dc < 8 && state[(row+d)*8+col+dc] && state[(row+d)*8+col+dc][0] !== color && !game.camos[(row+d)*8+col+dc]) moves.push((row+d)*8+col+dc); });
            } else if (type === 'N') {
                [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]].forEach(([dr, dc]) => check(row + dr, col + dc));
            } else if (type === 'B' || type === 'Q') {
                [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([dr, dc]) => { let r=row+dr, c=col+dc; while(r>=0&&r<8&&c>=0&&c<8) { if(!check(r,c)) break; r+=dr; c+=dc; } });
            }
            if (type === 'R' || type === 'Q') {
                [[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr, dc]) => { let r=row+dr, c=col+dc; while(r>=0&&r<8&&c>=0&&c<8) { if(!check(r,c)) break; r+=dr; c+=dc; } });
            } else if (type === 'K') {
                for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) if (dr!==0||dc!==0) check(row+dr, col+dc);
            }
            return moves;
        }

        // Keep local directory clean by dropping outdated dead lobbies on exit loops
        window.addEventListener('beforeunload', () => {
            if(playerRole === 'W' && myRoomId && activeRoomsMap[myRoomId]) {
                delete activeRoomsMap[myRoomId];
                globalLobbyChannel.publish("lobby_pulse", activeRoomsMap);
            }
        });
    </script>
</body>
</html>
